  <p class="lead" id="lead">This tour is optimized for your web browser &mdash; open it there for the full experience.</p>

  <a class="btn" id="openBtn" href="https://tours.zoomr.ca" target="_blank" rel="noopener" style="display:none">Open in browser &rsaquo;</a>

  if(isAndroid){
    // Android: show the one-tap open button (force Chrome), keep copy as a fallback
    document.getElementById("lead").textContent="This tour is optimized for your web browser. Tap below to open it.";
    var ob=document.getElementById("openBtn"); ob.style.display="flex";
    document.getElementById("browserName").textContent="Chrome";
    document.getElementById("steps").style.display="none";       // hide the iOS steps; button is primary
    document.getElementById("smallCopy").style.display="block";  // tiny fallback if the button is blocked
    ob.addEventListener("click",function(e){
      e.preventDefault();
      try{ window.location.href="intent://tours.zoomr.ca/#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url="+encodeURIComponent(URL_APP)+";end"; }
      catch(_){ window.open(URL_APP,"_blank"); }
    });
  } else if(isIOS){
    // iPhone: cannot open the browser from here — copy + paste is the way
    document.getElementById("lead").innerHTML="This tour is optimized for your web browser. On iPhone, copy the link and open it in <b>Safari</b>.";
    // copy block already visible; steps already say Safari
  } else {
    // desktop / unknown: a plain open link, plus copy as backup
    document.getElementById("openBtn").style.display="flex";
    document.getElementById("steps").style.display="none";
    document.getElementById("browserName").textContent="your browser";
  }
</script>
</body></html>
